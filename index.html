<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Hunt 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --navy:#1F4E79; --green:#1E7145; --amber:#7F4F00; --red:#9C0006; --grey:#555;
  --bg:#f0f2f5; --card:#fff; --border:#dde1e7; --text:#1a1a2e; --muted:#666;
  --confirmed:#C6EFCE; --potential:#FFEB9C;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:14px}

/* HEADER */
#header{background:var(--navy);color:#fff;padding:10px 16px;display:flex;
  align-items:center;gap:12px;position:sticky;top:0;z-index:1000;
  box-shadow:0 2px 8px rgba(0,0,0,.3);flex-wrap:wrap}
#header h1{font-size:15px;font-weight:700;flex:1;white-space:nowrap}
#header-stats{font-size:11px;opacity:.8;display:flex;gap:10px;flex-wrap:wrap}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.25)}
.hdr-btn.set{background:rgba(30,113,69,.6);border-color:var(--green)}
.hdr-btn.add{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}

/* LAYOUT */
#app{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 46px)}
#sidebar{overflow-y:auto;background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column}
#main{overflow:hidden;display:flex;flex-direction:column;position:relative}

/* FILTERS */
#filters{padding:10px 12px;border-bottom:1px solid var(--border);background:#f8f9fb}
#filters h2{font-size:10px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);margin-bottom:6px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.filter-btn{font-size:11px;padding:3px 8px;border-radius:10px;
  border:1px solid var(--border);background:#fff;cursor:pointer;white-space:nowrap;transition:all .12s}
.filter-btn:hover{border-color:var(--navy);color:var(--navy)}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.filter-btn.active.g{background:var(--green);border-color:var(--green)}
.filter-btn.active.a{background:var(--amber);border-color:var(--amber)}
.filter-row.sort-row{gap:4px}
.sort-btn{font-size:11px;padding:3px 8px;border-radius:4px;
  border:1px solid var(--border);background:#fff;cursor:pointer;white-space:nowrap}
.sort-btn.active{background:#e8f0fb;border-color:var(--navy);color:var(--navy);font-weight:600}
#search-box{width:100%;padding:6px 10px;border:1px solid var(--border);
  border-radius:4px;font-size:12px;margin-bottom:6px}
#result-count{font-size:11px;color:var(--muted);margin-top:2px}

/* PROPERTY LIST */
#prop-list{flex:1;overflow-y:auto}
.prop-card{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;
  display:flex;gap:9px;align-items:flex-start;transition:background .1s;position:relative}
.prop-card:hover{background:#f0f4f8}
.prop-card.selected{background:#e8f0fb;border-left:3px solid var(--navy)}
.rank-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:10px;color:#fff;flex-shrink:0;margin-top:1px}
.prop-card-body{flex:1;min-width:0}
.prop-card-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-card-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.prop-card-price{font-weight:700;color:var(--navy)}
.pill{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.pill.confirmed{background:var(--confirmed);color:var(--green)}
.pill.potential{background:var(--potential);color:var(--amber)}
.pill.caveat{background:#FFE4E4;color:var(--red)}
.pill.dup{background:#e8e8f0;color:#444}
.card-del-btn{position:absolute;top:8px;right:8px;background:none;border:none;
  color:#ccc;font-size:14px;cursor:pointer;padding:2px 5px;border-radius:3px;opacity:0}
.prop-card:hover .card-del-btn{opacity:1}
.card-del-btn:hover{background:#FFE4E4;color:var(--red)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* MAP */
#map-container{flex:1;position:relative}
#map{width:100%;height:100%}

/* DETAIL PANEL */
#detail-panel{position:absolute;top:0;right:0;width:460px;height:100%;
  background:#fff;border-left:1px solid var(--border);overflow-y:auto;
  transform:translateX(100%);transition:transform .25s ease;z-index:500;
  box-shadow:-4px 0 16px rgba(0,0,0,.1)}
#detail-panel.open{transform:translateX(0)}
#detail-close{position:absolute;top:10px;right:12px;background:none;border:none;
  font-size:20px;cursor:pointer;color:var(--muted);z-index:10;line-height:1}
#detail-close:hover{color:var(--text)}

/* GALLERY */
#gallery{background:#111;position:relative}
.gallery-main{width:100%;height:220px;object-fit:cover;display:block;cursor:pointer}
.gallery-thumbs{display:flex;gap:2px;padding:2px;background:#111;overflow-x:auto}
.gallery-thumbs img{width:60px;height:40px;object-fit:cover;cursor:pointer;
  border:2px solid transparent;flex-shrink:0;opacity:.7;transition:all .1s}
.gallery-thumbs img:hover,.gallery-thumbs img.active-thumb{opacity:1;border-color:#fff}
.gallery-tabs{display:flex;background:#222;border-bottom:1px solid #333}
.gallery-tab{font-size:11px;padding:5px 12px;color:#aaa;cursor:pointer;border:none;
  background:none;border-bottom:2px solid transparent;transition:all .1s}
.gallery-tab:hover{color:#fff}
.gallery-tab.active{color:#fff;border-bottom-color:#4d9fff}
.gallery-empty{height:80px;display:flex;align-items:center;justify-content:center;
  color:#666;font-size:12px;background:#111}
.floor-img{width:100%;max-height:300px;object-fit:contain;background:#f5f5f5;display:block;cursor:pointer}

/* DETAIL BODY */
.detail-body{padding:14px 16px}
.detail-rank{display:inline-block;padding:2px 8px;border-radius:3px;color:#fff;
  font-weight:700;font-size:11px;margin-bottom:6px}
.detail-name{font-size:15px;font-weight:700;margin-bottom:3px}
.detail-location{font-size:12px;color:var(--muted);margin-bottom:8px}
.detail-price{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:10px}
.detail-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.dpill{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.dpill.cluster{background:#e8f0fb;color:var(--navy)}
.dpill.ac{background:var(--confirmed);color:var(--green)}
.dpill.ap{background:var(--potential);color:var(--amber)}
.dpill.cav{background:#FFE4E4;color:var(--red)}
.detail-links{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dl{font-size:12px;padding:5px 11px;border-radius:4px;text-decoration:none;
  font-weight:600;display:inline-block;white-space:nowrap}
.dl.p{background:var(--navy);color:#fff}
.dl.s{background:#f0f4f8;color:var(--navy);border:1px solid var(--border)}
.dl.d{background:#fff8e1;color:var(--amber);border:1px solid #ffe082}
.dl:hover{opacity:.85}
.ds h3{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  margin-bottom:5px;border-bottom:1px solid var(--border);padding-bottom:3px;margin-top:12px}
.detail-desc{font-size:12.5px;line-height:1.6;color:#333}
.detail-agent{font-size:12px;color:var(--muted);margin-top:6px}

/* STATUS */
.status-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sbtn{font-size:11px;padding:4px 9px;border-radius:4px;border:1px solid var(--border);
  background:#fff;cursor:pointer;transition:all .1s}
.sbtn.on{color:#fff;border-color:transparent}
.sbtn[data-s="active"].on{background:var(--green)}
.sbtn[data-s="viewing-booked"].on{background:var(--navy)}
.sbtn[data-s="offer-made"].on{background:var(--amber)}
.sbtn[data-s="rejected"].on{background:var(--grey)}

/* NOTES */
#notes-area{width:100%;min-height:80px;border:1px solid var(--border);border-radius:4px;
  padding:8px;font-family:inherit;font-size:12.5px;resize:vertical;margin-bottom:6px}
.save-btn{background:var(--navy);color:#fff;border:none;padding:6px 13px;
  border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.save-btn:hover{opacity:.85}
.save-btn:disabled{background:var(--grey);cursor:default}
.note-ok{font-size:11px;color:var(--green);margin-left:8px}
.existing-note{background:#f8f9fb;border:1px solid var(--border);border-radius:4px;
  padding:8px 10px;font-size:12.5px;line-height:1.6;margin-bottom:8px;white-space:pre-wrap}
.note-meta{font-size:10px;color:var(--muted);margin-bottom:3px}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.photo-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:4px;
  cursor:pointer;border:1px solid var(--border)}
.upload-zone{border:2px dashed var(--border);border-radius:6px;padding:14px;
  text-align:center;font-size:12px;color:var(--muted);cursor:pointer;transition:all .12s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--navy);color:var(--navy);background:#f0f4f8}
#file-input{display:none}
.up-prog{font-size:11px;color:var(--navy);margin-top:5px}

/* ADD PROPERTY MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:9999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:8px;padding:22px;width:500px;max-width:95vw;
  max-height:90vh;overflow-y:auto}
.modal-box h2{font-size:15px;margin-bottom:12px;color:var(--navy)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.modal-grid .full{grid-column:1/-1}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;
  padding:7px 9px;border:1px solid var(--border);border-radius:4px;font-size:12.5px;font-family:inherit}
.modal-field textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.mbtn{padding:7px 16px;border-radius:4px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.mbtn.p{background:var(--navy);color:#fff}
.mbtn.s{background:#f0f4f8;color:var(--text)}
.mbtn.d{background:#FFE4E4;color:var(--red)}

/* CONFIRM MODAL */
#confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:10000;align-items:center;justify-content:center}
#confirm-modal.show{display:flex}
.confirm-box{background:#fff;border-radius:8px;padding:22px;width:360px;max-width:95vw}
.confirm-box h2{font-size:14px;margin-bottom:8px}
.confirm-box p{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5}

/* TOKEN */
#token-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:9998;align-items:center;justify-content:center}
#token-modal.show{display:flex}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9997;
  align-items:center;justify-content:center;flex-direction:column}
#lightbox.show{display:flex}
#lightbox-img{max-width:92vw;max-height:88vh;object-fit:contain}
#lightbox-close{position:absolute;top:14px;right:18px;color:#fff;font-size:26px;
  cursor:pointer;background:none;border:none;line-height:1}
#lightbox-nav{display:flex;gap:20px;margin-top:12px}
.lb-nav-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;padding:6px 18px;border-radius:4px;cursor:pointer;font-size:14px}
.lb-nav-btn:hover{background:rgba(255,255,255,.25)}


/* SCORECARD */
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sc-overall{display:flex;align-items:center;gap:10px}
.sc-ring{width:52px;height:52px;flex-shrink:0}
.sc-ring circle{fill:none;stroke-width:6;stroke-linecap:round}
.sc-ring .bg{stroke:#e8edf2}
.sc-ring .fill{stroke:#1E7145;transition:stroke-dashoffset .4s ease;transform:rotate(-90deg);transform-origin:50% 50%}
.sc-pct{font-size:13px;font-weight:700;color:var(--navy)}
.sc-cats{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.sc-row{display:grid;grid-template-columns:110px 1fr 60px;gap:6px;align-items:center;
  font-size:11.5px;padding:4px 0;border-bottom:1px solid #f0f2f5}
.sc-row:last-child{border-bottom:none}
.sc-cat-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  color:var(--muted);margin-top:8px;margin-bottom:2px;padding-top:4px;
  border-top:1px solid var(--border);grid-column:1/-1}
.sc-label{color:#333;font-size:11.5px}
.sc-note{font-size:11px;color:var(--muted)}
.sc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;text-align:center;white-space:nowrap}
.sc-badge.green{background:#C6EFCE;color:#1E7145}
.sc-badge.amber{background:#FFEB9C;color:#7F4F00}
.sc-badge.red{background:#FFE4E4;color:#9C0006}
.sc-badge.grey{background:#f0f2f5;color:#888}
.sc-flags{margin-bottom:10px}
.sc-flag{display:flex;gap:6px;align-items:flex-start;font-size:12px;color:#9C0006;
  background:#FFF0F0;border-left:3px solid #9C0006;padding:6px 8px;
  border-radius:0 4px 4px 0;margin-bottom:5px;line-height:1.4}
.sc-flag-icon{flex-shrink:0;margin-top:1px}
.sc-qs{margin-bottom:4px}
.sc-q{display:flex;gap:6px;align-items:flex-start;font-size:12px;
  background:#EBF3FB;border-left:3px solid var(--navy);padding:6px 8px;
  border-radius:0 4px 4px 0;margin-bottom:5px;line-height:1.4;color:#1a3a5c}
.sc-q-icon{flex-shrink:0;font-weight:700;color:var(--navy);margin-top:1px}
.copy-qs-btn{font-size:11px;background:#f0f4f8;border:1px solid var(--border);
  color:var(--navy);padding:4px 10px;border-radius:4px;cursor:pointer;margin-bottom:8px}
.copy-qs-btn:hover{background:#e0eaf8}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#aaa}

/* RESPONSIVE */
@media(max-width:860px){
  #app{grid-template-columns:1fr;grid-template-rows:55vh 1fr}
  #main{grid-row:1}
  #sidebar{grid-row:2;max-height:45vh}
  #detail-panel{width:100%}
}
</style>
</head>
<body>

<div id="header">
  <h1>🏡 House Hunt 2026</h1>
  <div id="header-stats">
    <span id="stat-active">—</span>
    <span id="stat-viewing">—</span>
    <span id="stat-offer">—</span>
  </div>
  <button class="hdr-btn add" onclick="showAddModal()">＋ Add property</button>
  <button class="hdr-btn" id="token-btn" onclick="showTokenModal()">⚙ GitHub Token</button>
</div>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="filters">
      <h2>Sort</h2>
      <div class="filter-row sort-row" id="sort-btns">
        <button class="sort-btn active" data-sort="rank" onclick="setSort(this)">Rank</button>
        <button class="sort-btn" data-sort="price-asc" onclick="setSort(this)">Price ↑</button>
        <button class="sort-btn" data-sort="price-desc" onclick="setSort(this)">Price ↓</button>
        <button class="sort-btn" data-sort="name" onclick="setSort(this)">A–Z</button>
        <button class="sort-btn" data-sort="cluster" onclick="setSort(this)">Area</button>
        <button class="sort-btn" data-sort="status" onclick="setSort(this)">Status</button>
        <button class="sort-btn" data-sort="annexe" onclick="setSort(this)">Annexe</button>
      </div>
      <h2 style="margin-top:6px">Filter</h2>
      <input id="search-box" type="text" placeholder="Search name, location, agent…" oninput="applyFilters()">
      <div class="filter-row" id="cluster-filters"></div>
      <div class="filter-row">
        <button class="filter-btn active" data-f="annexe" data-v="all" onclick="toggleF(this)">All annexe</button>
        <button class="filter-btn g" data-f="annexe" data-v="confirmed" onclick="toggleF(this)">✓ Confirmed</button>
        <button class="filter-btn a" data-f="annexe" data-v="potential" onclick="toggleF(this)">~ Potential</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-f="status" data-v="all" onclick="toggleF(this)">All status</button>
        <button class="filter-btn" data-f="status" data-v="active" onclick="toggleF(this)">Active</button>
        <button class="filter-btn" data-f="status" data-v="viewing-booked" onclick="toggleF(this)">Viewing</button>
        <button class="filter-btn" data-f="status" data-v="offer-made" onclick="toggleF(this)">Offer</button>
        <button class="filter-btn" data-f="status" data-v="rejected" onclick="toggleF(this)">Rejected</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-f="caveat" data-v="all" onclick="toggleF(this)">All</button>
        <button class="filter-btn" data-f="caveat" data-v="none" onclick="toggleF(this)">No caveats</button>
        <button class="filter-btn" data-f="caveat" data-v="has" onclick="toggleF(this)">⚠ Has caveat</button>
      </div>
      <div id="result-count"></div>
    </div>
    <div id="prop-list"></div>
  </div>

  <!-- MAP + DETAIL -->
  <div id="main">
    <div id="map-container">
      <div id="map"></div>
      <div id="detail-panel">
        <button id="detail-close" onclick="closeDetail()">✕</button>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- ADD PROPERTY MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box">
    <h2>Add property</h2>
    <div class="modal-grid">
      <div class="modal-field full">
        <label>Rightmove URL or ref number</label>
        <input id="add-ref" placeholder="https://www.rightmove.co.uk/properties/12345678 or 12345678"
          oninput="inferFromRef()">
      </div>
      <div class="modal-field full">
        <label>Property name / title</label>
        <input id="add-name" placeholder="e.g. The Old Rectory, Nether Stowey">
      </div>
      <div class="modal-field">
        <label>Price (£)</label>
        <input id="add-price" type="number" placeholder="450000">
      </div>
      <div class="modal-field">
        <label>Location</label>
        <input id="add-location" placeholder="e.g. Nether Stowey, Somerset">
      </div>
      <div class="modal-field">
        <label>Cluster / Area</label>
        <input id="add-cluster" placeholder="e.g. Somerset West" list="cluster-list">
        <datalist id="cluster-list"></datalist>
      </div>
      <div class="modal-field">
        <label>Agent</label>
        <input id="add-agent" placeholder="Agent name">
      </div>
      <div class="modal-field">
        <label>Annexe status</label>
        <select id="add-annexe">
          <option value="confirmed">Confirmed</option>
          <option value="potential" selected>Potential</option>
          <option value="unknown">Unknown</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Caveat (optional)</label>
        <input id="add-caveat" placeholder="e.g. flood, ferry, prc, bungalow">
      </div>
      <div class="modal-field">
        <label>Latitude</label>
        <input id="add-lat" type="number" step="0.0001" placeholder="51.0678">
      </div>
      <div class="modal-field">
        <label>Longitude</label>
        <input id="add-lng" type="number" step="0.0001" placeholder="-3.1789">
      </div>
      <div class="modal-field full">
        <label>Short description</label>
        <textarea id="add-desc" placeholder="Brief description of the property…"></textarea>
      </div>
      <div class="modal-field full">
        <label>Duplicate listing ref (if any)</label>
        <input id="add-dup" placeholder="e.g. 87545469">
      </div>
    </div>
    <div id="add-geo-hint" style="font-size:11px;color:var(--amber);margin-bottom:10px;display:none">
      ⚠ Lat/lng needed for map pin. Look up the address on
      <a href="https://www.latlong.net/" target="_blank">latlong.net</a>.
    </div>
    <div class="modal-btns">
      <button class="mbtn p" onclick="addProperty()">Add property</button>
      <button class="mbtn s" onclick="hideAddModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div id="confirm-modal">
  <div class="confirm-box">
    <h2>Delete property?</h2>
    <p id="confirm-msg"></p>
    <div class="modal-btns">
      <button class="mbtn d" id="confirm-yes">Delete</button>
      <button class="mbtn s" onclick="hideConfirm()">Cancel</button>
    </div>
  </div>
</div>

<!-- TOKEN MODAL -->
<div id="token-modal">
  <div class="modal-box" style="max-width:440px">
    <h2>GitHub Personal Access Token</h2>
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.5">
      Fine-grained token for <strong>its-not-rocket-science/house</strong>.
      Stored in your browser's localStorage only.
    </p>
    <div class="modal-field" style="margin-bottom:12px">
      <input type="password" id="token-input" placeholder="github_pat_…">
    </div>
    <div class="modal-btns">
      <button class="mbtn p" onclick="saveToken()">Save</button>
      <button class="mbtn s" onclick="hideTokenModal()">Cancel</button>
      <button class="mbtn s" onclick="clearToken()">Clear</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="handleLightboxClick(event)">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-nav">
    <button class="lb-nav-btn" onclick="lbNav(-1)">◀ Prev</button>
    <button class="lb-nav-btn" onclick="lbNav(1)">Next ▶</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const OWNER = 'its-not-rocket-science', REPO = 'house';
const PROPS_PATH = 'data/properties.json', NOTES_PATH = 'data/notes.json';
const PHOTOS_DIR = 'data/photos';

// ── STATE ─────────────────────────────────────────────────────────────────────
let properties = [], notes = {notes:{},visits:{},photos:{}}, scorecards = {};
let filtered = [], selected = null, currentSort = 'rank';
let activeF = {cluster:'all',annexe:'all',status:'all',caveat:'all'};
let map = null, markers = {};
let lbImages = [], lbIndex = 0;

// ── RANK COLOUR ───────────────────────────────────────────────────────────────
const rc = r => r<=2?'#1F4E79':r<=6?'#375623':r<=12?'#7F4F00':r<=20?'#555':'#888';

// ── IMAGE MANIFEST ────────────────────────────────────────────────────────────
let imageManifest = {};

async function loadManifest() {
  try {
    const r = await fetch('data/images/manifest.json');
    if (r.ok) imageManifest = await r.json();
  } catch(e) { imageManifest = {}; }
}

function localPhotos(ref) {
  const entry = imageManifest[ref];
  if (entry && entry.photos && entry.photos.length)
    return entry.photos.map(p => p.startsWith('http') ? p : p);
  return [];
}

function localFloorplans(ref) {
  const entry = imageManifest[ref];
  if (entry && entry.floorplans && entry.floorplans.length)
    return entry.floorplans.map(p => p.startsWith('http') ? p : p);
  return [];
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadManifest();
  try { const sc = await fetch('data/scorecards.json'); scorecards = await sc.json(); } catch(e) {}
  const r = await fetch('data/properties.json');
  properties = await r.json();
  await loadNotes();
  const savedS = JSON.parse(localStorage.getItem('prop_statuses')||'{}');
  properties.forEach(p=>{ if(savedS[p.ref]) p.status=savedS[p.ref]; });
  buildClusterFilters();
  populateClusterDatalist();
  initMap();
  applyFilters();
  updateStats();
  updateTokenBtn();
}

function buildClusterFilters() {
  const clusters = ['all',...new Set(properties.map(p=>p.cluster))].sort();
  const c = document.getElementById('cluster-filters');
  clusters.forEach(cl=>{
    const b = document.createElement('button');
    b.className='filter-btn'+(cl==='all'?' active':'');
    b.dataset.f='cluster'; b.dataset.v=cl;
    b.textContent=cl==='all'?'All areas':cl;
    b.onclick=()=>toggleF(b);
    c.appendChild(b);
  });
}

function populateClusterDatalist() {
  const dl = document.getElementById('cluster-list');
  [...new Set(properties.map(p=>p.cluster))].sort().forEach(cl=>{
    const o=document.createElement('option'); o.value=cl; dl.appendChild(o);
  });
}

function initMap() {
  map = L.map('map').setView([51.5,-2.5],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {attribution:'© OpenStreetMap contributors',maxZoom:18}).addTo(map);
  properties.forEach(addMarker);
}

function addMarker(p) {
  const col = rc(p.rank);
  const icon = L.divIcon({
    html:`<div style="background:${col};width:26px;height:26px;border-radius:50%;
      border:2px solid #fff;display:flex;align-items:center;justify-content:center;
      box-shadow:0 1px 5px rgba(0,0,0,.4)">
      <span style="color:#fff;font-size:10px;font-weight:700">${p.rank}</span></div>`,
    iconSize:[26,26],iconAnchor:[13,13],className:''
  });
  const m = L.marker([p.lat,p.lng],{icon}).addTo(map);
  m.bindPopup(`<strong>${p.name}</strong><br>${p.price_display}<br>
    <a href="#" style="font-size:11px;color:var(--navy)"
      onclick="event.preventDefault();selectProp('${p.ref}')">View details →</a>`);
  m.on('click',()=>selectProp(p.ref));
  markers[p.ref]=m;
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function setSort(btn) {
  currentSort = btn.dataset.sort;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b===btn));
  applyFilters();
}

function sortProps(arr) {
  const a=[...arr];
  const statusOrder={active:0,'viewing-booked':1,'offer-made':2,rejected:3};
  switch(currentSort) {
    case 'rank':       return a.sort((x,y)=>x.rank-y.rank);
    case 'price-asc':  return a.sort((x,y)=>x.price-y.price);
    case 'price-desc': return a.sort((x,y)=>y.price-x.price);
    case 'name':       return a.sort((x,y)=>x.name.localeCompare(y.name));
    case 'cluster':    return a.sort((x,y)=>x.cluster.localeCompare(y.cluster)||x.rank-y.rank);
    case 'status':     return a.sort((x,y)=>(statusOrder[x.status]||0)-(statusOrder[y.status]||0)||x.rank-y.rank);
    case 'annexe':     return a.sort((x,y)=>{
      const o={confirmed:0,potential:1,unknown:2};
      return (o[x.annexe]||2)-(o[y.annexe]||2)||x.rank-y.rank;
    });
    default: return a;
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function toggleF(btn) {
  const f=btn.dataset.f, v=btn.dataset.v;
  activeF[f]=v;
  document.querySelectorAll(`[data-f="${f}"]`).forEach(b=>
    b.classList.toggle('active',b.dataset.v===v));
  applyFilters();
}

function applyFilters() {
  const q=document.getElementById('search-box').value.toLowerCase();
  let res=properties.filter(p=>{
    if(activeF.cluster!=='all'&&p.cluster!==activeF.cluster) return false;
    if(activeF.annexe!=='all'&&p.annexe!==activeF.annexe) return false;
    if(activeF.status!=='all'&&p.status!==activeF.status) return false;
    if(activeF.caveat==='none'&&p.caveat) return false;
    if(activeF.caveat==='has'&&!p.caveat) return false;
    if(q&&!`${p.name} ${p.location} ${p.agent} ${p.cluster}`.toLowerCase().includes(q)) return false;
    return true;
  });
  filtered=sortProps(res);
  renderList();
  updateMapMarkers();
  document.getElementById('result-count').textContent=
    `${filtered.length} of ${properties.length} properties`;
}

function renderList() {
  const list=document.getElementById('prop-list');
  list.innerHTML='';
  filtered.forEach(p=>{
    const hasNote=notes.notes[p.ref];
    const photoCount=(notes.photos[p.ref]||[]).length;
    const isDup=p.duplicate_of||p.duplicate_refs?.length;
    const div=document.createElement('div');
    div.className='prop-card'+(selected===p.ref?' selected':'');
    div.dataset.ref=p.ref;
    div.onclick=()=>selectProp(p.ref);
    div.innerHTML=`
      <div class="rank-badge" style="background:${rc(p.rank)}">${p.rank}</div>
      <div class="prop-card-body">
        <div class="prop-card-name">${p.name}</div>
        <div class="prop-card-meta">
          <span class="prop-card-price">${p.price_display}</span>
          <span class="pill ${p.annexe}">${p.annexe==='confirmed'?'✓ Annexe':'~ Potential'}</span>
          ${p.caveat?`<span class="pill caveat">⚠ ${p.caveat}</span>`:''}
          ${isDup?'<span class="pill dup">duplicate</span>':''}
          ${hasNote?'<span style="font-size:10px">📝</span>':''}
          ${photoCount?`<span style="font-size:10px">📷${photoCount}</span>`:''}
        </div>
        <div class="prop-card-meta" style="margin-top:2px">
          <span>${p.cluster}</span>
          <span style="color:${sCol(p.status)};font-weight:600">${sLabel(p.status)}</span>
        </div>
      </div>
      <div class="status-dot" style="background:${sCol(p.status)}"></div>
      <button class="card-del-btn" title="Delete" onclick="event.stopPropagation();confirmDelete('${p.ref}')">✕</button>`;
    list.appendChild(div);
  });
}

function updateMapMarkers() {
  const refs=new Set(filtered.map(p=>p.ref));
  Object.entries(markers).forEach(([ref,m])=>m.setOpacity(refs.has(ref)?1:0.2));
}

// ── SELECT ────────────────────────────────────────────────────────────────────
function selectProp(ref) {
  selected=ref;
  const p=properties.find(x=>x.ref===ref);
  if(!p) return;
  document.querySelectorAll('.prop-card').forEach(c=>
    c.classList.toggle('selected',c.dataset.ref===ref));
  if(markers[ref]) { map.panTo([p.lat,p.lng]); markers[ref].openPopup(); }
  renderDetail(p);
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selected=null;
  document.querySelectorAll('.prop-card').forEach(c=>c.classList.remove('selected'));
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function renderDetail(p) {
  const visitPhotos=notes.photos[p.ref]||[];
  const existingNote=notes.notes[p.ref];
  const visitDate=notes.visits[p.ref];
  const col=rc(p.rank);

  // Gallery: use local images from manifest
  const rmImgs=localPhotos(p.ref);
  const rmFloors=localFloorplans(p.ref);
  const dupRefs=p.duplicate_refs||[];

  document.getElementById('detail-content').innerHTML=`
    <!-- GALLERY -->
    <div id="gallery">
      <div class="gallery-tabs">
        <button class="gallery-tab active" onclick="switchGalleryTab(this,'listing')">Listing photos</button>
        <button class="gallery-tab" onclick="switchGalleryTab(this,'floor')">Floorplan</button>
        <button class="gallery-tab" onclick="switchGalleryTab(this,'visit')">Visit photos (${visitPhotos.length})</button>
      </div>
      <div id="gtab-listing">
        ${rmImgs.length ? `
          <img class="gallery-main" id="gallery-main-img"
            src="${rmImgs[0]}" alt="Photo 1"
            onerror="this.style.display='none'"
            onclick="galleryLb(0)">
          <div class="gallery-thumbs">
            ${rmImgs.map((src,i)=>`<img src="${src}" data-idx="${i}" class="${i===0?'active-thumb':''}"
              onerror="this.style.display='none'"
              onclick="pickPhoto(this,${i})" alt="Photo ${i+1}">`).join('')}
          </div>` :
          `<div class="gallery-empty">
            Photos not yet downloaded — run scripts/rightmove_image_scraper.py then push to repo.<br>
            <a href="${p.rightmove_url}" target="_blank" style="color:#4d9fff">View on Rightmove ↗</a>
          </div>`}
      </div>
      <div id="gtab-floor" style="display:none">
        ${rmFloors.length ? `
          <img class="gallery-main" id="gallery-floor-main"
            src="${rmFloors[0]}" alt="Floorplan"
            onerror="this.style.display='none'"
            onclick="floorLb(0)">
          ${rmFloors.length > 1 ? `<div class="gallery-thumbs">
            ${rmFloors.map((src,i)=>`<img src="${src}" data-idx="${i}" class="${i===0?'active-thumb':''}"
              onerror="this.style.display='none'"
              onclick="pickFloor(this,${i})" alt="Floorplan ${i+1}">`).join('')}
          </div>` : ''}` :
          `<div class="gallery-empty">
            No floorplan available — <a href="${p.rightmove_url}" target="_blank" style="color:#4d9fff">view on Rightmove ↗</a>
          </div>`}
      </div>
      <div id="gtab-visit" style="display:none">
        ${visitPhotos.length ? `<div style="padding:6px"><div class="photo-grid">
          ${visitPhotos.map((ph,i)=>`<img class="photo-thumb" src="${ph.url}"
            onclick="visitLb(${i})" alt="${ph.name}">`).join('')}
        </div></div>` : `<div class="gallery-empty">No visit photos yet</div>`}
      </div>
    </div>

    <!-- BODY -->
    <div class="detail-body">
      <div class="detail-rank" style="background:${col}">Rank #${p.rank}</div>
      <div class="detail-name">${p.name}</div>
      <div class="detail-location">📍 ${p.location}</div>
      <div class="detail-price">${p.price_display}</div>
      <div class="detail-pills">
        <span class="dpill cluster">${p.cluster}</span>
        <span class="dpill ${p.annexe==='confirmed'?'ac':'ap'}">
          ${p.annexe==='confirmed'?'✓ Confirmed annexe':'~ Annexe potential'}</span>
        ${p.caveat?`<span class="dpill cav">⚠ ${p.caveat}</span>`:''}
      </div>

      <!-- LINKS -->
      <div class="detail-links">
        <a class="dl p" href="${p.rightmove_url}" target="_blank">Rightmove ↗</a>
        <a class="dl s" href="${p.contact_url}" target="_blank">Contact agent ↗</a>
        ${dupRefs.map(dr=>`<a class="dl d" href="https://www.rightmove.co.uk/properties/${dr}" target="_blank">
          Duplicate listing ${dr} ↗</a>`).join('')}
      </div>

      <!-- STATUS -->
      <div class="ds"><h3>Status</h3></div>
      <div class="status-row">
        ${['active','viewing-booked','offer-made','rejected'].map(s=>
          `<button class="sbtn ${p.status===s?'on':''}" data-s="${s}"
            onclick="setStatus('${p.ref}','${s}')">${sLabel(s)}</button>`).join('')}
      </div>

      <!-- ABOUT -->
      <div class="ds"><h3>About</h3></div>
      ${(()=>{
        const full = (p.full_desc||p.short_desc||'').replace(/\n/g,'<br>');
        const short = (p.short_desc||'');
        const needsExpand = (p.full_desc||'').length > (short.length + 20);
        if (!needsExpand) return `<div class="detail-desc">${full||'—'}</div>`;
        return `<div class="detail-desc" id="desc-short-${p.ref}">${esc(short)}</div>
          <div class="detail-desc" id="desc-full-${p.ref}" style="display:none">${(p.full_desc||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>
          <button onclick="toggleDesc('${p.ref}')" id="desc-toggle-${p.ref}"
            style="margin-top:6px;background:none;border:none;color:var(--navy);
            font-size:12px;cursor:pointer;padding:0;font-weight:600">
            ▼ Show full description
          </button>`;
      })()}
      <div class="detail-agent" style="margin-top:8px">Agent: ${p.agent}</div>

      <!-- SCORECARD -->
      ${renderScorecard(p.ref)}

      <!-- NOTES -->
      <div class="ds"><h3>Notes</h3></div>
      ${existingNote?`
        <div class="note-meta">Last updated: ${existingNote.date}</div>
        <div class="existing-note">${esc(existingNote.text)}</div>`:''}
      <textarea id="notes-area" placeholder="Add notes — impressions, questions for agent, what you noticed on the viewing…">${existingNote?existingNote.text:''}</textarea>
      <div style="display:flex;align-items:center">
        <button class="save-btn" onclick="saveNote('${p.ref}')">Save note</button>
        <span class="note-ok" id="note-ok"></span>
      </div>

      <!-- UPLOAD -->
      <div class="ds"><h3>Upload visit photos</h3></div>
      <div class="upload-zone" id="uz-${p.ref}"
        onclick="document.getElementById('file-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleDrop(event,'${p.ref}')">
        📷 Click or drag photos here
      </div>
      <input type="file" id="file-input" accept="image/*" multiple
        onchange="handleFileInput(event,'${p.ref}')">
      <div class="up-prog" id="up-prog-${p.ref}"></div>

      <!-- VIEWING DATE -->
      <div class="ds"><h3>Viewing date</h3></div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="date" id="vd-${p.ref}" value="${visitDate||''}"
          style="padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
        <button class="save-btn" onclick="saveVisitDate('${p.ref}')">Save</button>
      </div>

      <!-- DELETE -->
      <div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border)">
        <button onclick="confirmDelete('${p.ref}')"
          style="background:#FFE4E4;color:var(--red);border:1px solid #ffc4c4;
          padding:6px 13px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">
          🗑 Remove this property
        </button>
      </div>
    </div>`;

  // Store image sets as globals for lightbox access
  window._gImgs   = rmImgs;
  window._fImgs   = rmFloors;
  window._vPhotos = notes.photos[p.ref] || [];
}


function switchGalleryTab(btn, tab) {
  document.querySelectorAll('.gallery-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['listing','floor','visit'].forEach(t=>{
    const el=document.getElementById('gtab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
}

// Gallery helpers — all use window._gImgs / _fImgs / _vPhotos set in renderDetail
function galleryLb(i)  { openLb(window._gImgs,   i); }
function floorLb(i)    { openLb(window._fImgs,    i); }
function visitLb(i)    { openLb(window._vPhotos.map(p=>p.url), i); }

function pickPhoto(thumb, i) {
  const main = document.getElementById('gallery-main-img');
  if (main) { main.src = window._gImgs[i]; main.onclick = ()=>galleryLb(i); }
  document.querySelectorAll('#gtab-listing .gallery-thumbs img').forEach(t=>t.classList.remove('active-thumb'));
  thumb.classList.add('active-thumb');
}

function pickFloor(thumb, i) {
  const main = document.getElementById('gallery-floor-main');
  if (main) { main.src = window._fImgs[i]; main.style.display=''; main.onclick = ()=>floorLb(i); }
  document.querySelectorAll('#gtab-floor .gallery-thumbs img').forEach(t=>t.classList.remove('active-thumb'));
  thumb.classList.add('active-thumb');
}

// ── STATUS ────────────────────────────────────────────────────────────────────
const sLabel=s=>({'active':'Active','viewing-booked':'Viewing booked','offer-made':'Offer made','rejected':'Rejected'}[s]||s);
const sCol=s=>({'active':' #1E7145','viewing-booked':'#1F4E79','offer-made':'#7F4F00','rejected':'#888'}[s]||'#ccc');

function setStatus(ref,status) {
  const p=properties.find(x=>x.ref===ref);
  if(!p) return;
  p.status=status;
  const saved=JSON.parse(localStorage.getItem('prop_statuses')||'{}');
  saved[ref]=status;
  localStorage.setItem('prop_statuses',JSON.stringify(saved));
  renderList(); renderDetail(p); updateStats();
  pushPropsFile('Update status for '+ref);
}

function updateStats() {
  const a=properties.filter(p=>p.status==='active').length;
  const v=properties.filter(p=>p.status==='viewing-booked').length;
  const o=properties.filter(p=>p.status==='offer-made').length;
  document.getElementById('stat-active').textContent=`${a} active`;
  document.getElementById('stat-viewing').textContent=`${v} viewing`;
  document.getElementById('stat-offer').textContent=`${o} offer`;
}

// ── ADD PROPERTY ──────────────────────────────────────────────────────────────
function showAddModal() {
  document.getElementById('add-modal').classList.add('show');
}
function hideAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

function inferFromRef() {
  const val=document.getElementById('add-ref').value.trim();
  const m=val.match(/(\d{8,9})/);
  if(!m) return;
  const ref=m[1];
  // Pre-fill URLs — user still needs to fill in the rest
  document.getElementById('add-ref').value=ref;
}

async function addProperty() {
  const refRaw=document.getElementById('add-ref').value.trim();
  const refM=refRaw.match(/(\d{8,9})/);
  if(!refM) { alert('Please enter a valid Rightmove ref or URL'); return; }
  const ref=refM[1];
  if(properties.find(p=>p.ref===ref)) { alert('This property is already in the list'); return; }

  const name=document.getElementById('add-name').value.trim();
  const price=parseInt(document.getElementById('add-price').value)||0;
  const location=document.getElementById('add-location').value.trim();
  const cluster=document.getElementById('add-cluster').value.trim()||'Other';
  const agent=document.getElementById('add-agent').value.trim();
  const annexe=document.getElementById('add-annexe').value;
  const caveat=document.getElementById('add-caveat').value.trim()||null;
  const lat=parseFloat(document.getElementById('add-lat').value)||0;
  const lng=parseFloat(document.getElementById('add-lng').value)||0;
  const short_desc=document.getElementById('add-desc').value.trim();
  const dupRef=document.getElementById('add-dup').value.trim();

  if(!lat||!lng) {
    document.getElementById('add-geo-hint').style.display='block';
    return;
  }

  const newRank=properties.length+1;
  const prop={
    ref, name:name||ref, rank:newRank, price,
    price_display:`£${price.toLocaleString()}`,
    location, cluster, agent, annexe, caveat, short_desc, status:'active',
    lat, lng,
    rightmove_url:`https://www.rightmove.co.uk/properties/${ref}`,
    contact_url:`https://www.rightmove.co.uk/property-for-sale/contactBranch.html?backToPropertyURL=%2Fproperties%2F${ref}&propertyId=${ref}`,
    duplicate_refs: dupRef ? [dupRef] : [],
  };

  properties.push(prop);
  addMarker(prop);
  hideAddModal();
  applyFilters();
  updateStats();
  await pushPropsFile(`Add property ${ref}: ${name}`);
  selectProp(ref);

  // Clear form
  ['add-ref','add-name','add-price','add-location','add-cluster',
   'add-agent','add-caveat','add-lat','add-lng','add-desc','add-dup']
    .forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-annexe').value='potential';
  document.getElementById('add-geo-hint').style.display='none';
}

// ── DELETE PROPERTY ───────────────────────────────────────────────────────────
function confirmDelete(ref) {
  const p=properties.find(x=>x.ref===ref);
  if(!p) return;
  document.getElementById('confirm-msg').textContent=
    `Remove "${p.name}" (${p.price_display}) from your list? This cannot be undone.`;
  document.getElementById('confirm-yes').onclick=()=>deleteProperty(ref);
  document.getElementById('confirm-modal').classList.add('show');
}

function hideConfirm() {
  document.getElementById('confirm-modal').classList.remove('show');
}

async function deleteProperty(ref) {
  hideConfirm();
  if(selected===ref) closeDetail();
  // Remove marker
  if(markers[ref]) { map.removeLayer(markers[ref]); delete markers[ref]; }
  // Remove from array
  properties=properties.filter(p=>p.ref!==ref);
  applyFilters();
  updateStats();
  await pushPropsFile(`Remove property ${ref}`);
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
async function loadNotes() {
  const token=getToken();
  if(token) {
    try {
      const r=await ghGet(NOTES_PATH);
      if(r.ok){const d=await r.json();notes=JSON.parse(atob(d.content));return;}
    } catch(e){}
  }
  const local=localStorage.getItem('house_notes');
  if(local){try{notes=JSON.parse(local);}catch(e){}}
}

async function saveNote(ref) {
  const text=document.getElementById('notes-area').value.trim();
  if(!text) return;
  notes.notes[ref]={text,date:new Date().toLocaleDateString('en-GB')};
  localStorage.setItem('house_notes',JSON.stringify(notes));
  await pushNotesFile('Update note for '+ref);
  const ok=document.getElementById('note-ok');
  if(ok){ok.textContent='Saved ✓';setTimeout(()=>ok.textContent='',2500);}
  renderList();
}

async function saveVisitDate(ref) {
  const date=document.getElementById('vd-'+ref)?.value;
  if(!date) return;
  notes.visits[ref]=date;
  localStorage.setItem('house_notes',JSON.stringify(notes));
  await pushNotesFile('Save visit date for '+ref);
}

// ── PHOTOS ────────────────────────────────────────────────────────────────────
function handleFileInput(e,ref){uploadFiles([...e.target.files],ref);}
function handleDrop(e,ref){
  e.preventDefault();
  document.getElementById('uz-'+ref)?.classList.remove('drag');
  uploadFiles([...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')),ref);
}

async function uploadFiles(files,ref) {
  const token=getToken();
  if(!token){showTokenModal();return;}
  const prog=document.getElementById('up-prog-'+ref);
  if(!notes.photos[ref]) notes.photos[ref]=[];
  for(let i=0;i<files.length;i++){
    const file=files[i];
    if(prog) prog.textContent=`Uploading ${i+1}/${files.length}: ${file.name}…`;
    try{
      const b64=await fileToB64(file);
      const path=`${PHOTOS_DIR}/${ref}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
      await ghPut(path,b64,`Add photo for ${ref}: ${file.name}`);
      const url=`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}`;
      notes.photos[ref].push({url,name:file.name,date:new Date().toLocaleDateString('en-GB')});
    }catch(e){if(prog)prog.textContent=`Error: ${e.message}`;continue;}
  }
  await pushNotesFile('Update photos for '+ref);
  localStorage.setItem('house_notes',JSON.stringify(notes));
  if(prog){prog.textContent=`✓ ${files.length} photo${files.length>1?'s':''} uploaded`;
    setTimeout(()=>prog&&(prog.textContent=''),3000);}
  const p=properties.find(x=>x.ref===ref);
  if(p) renderDetail(p);
  renderList();
}

const fileToB64=f=>new Promise((res,rej)=>{
  const r=new FileReader();
  r.onload=()=>res(r.result.split(',')[1]);
  r.onerror=()=>rej(new Error('Read failed'));
  r.readAsDataURL(f);
});

// ── GITHUB API ────────────────────────────────────────────────────────────────
const getToken=()=>localStorage.getItem('gh_token');
const ghHdrs=()=>({'Authorization':`Bearer ${getToken()}`,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'});
const ghGet=path=>fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,{headers:ghHdrs()});

async function ghPut(path,b64,message){
  let sha=null;
  const ex=await ghGet(path);
  if(ex.ok){const d=await ex.json();sha=d.sha;}
  const body={message,content:b64};
  if(sha) body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,
    {method:'PUT',headers:{...ghHdrs(),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  return r;
}

async function pushPropsFile(message) {
  const token=getToken();
  if(!token) return;
  try {
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(properties,null,2))));
    await ghPut(PROPS_PATH,content,message);
  } catch(e){console.warn('Props push failed:',e);}
}

async function pushNotesFile(message) {
  const token=getToken();
  if(!token) return;
  try {
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(notes,null,2))));
    await ghPut(NOTES_PATH,content,message);
  } catch(e){console.warn('Notes push failed (saved locally):',e);}
}

// ── TOKEN ─────────────────────────────────────────────────────────────────────
function showTokenModal(){document.getElementById('token-modal').classList.add('show');}
function hideTokenModal(){document.getElementById('token-modal').classList.remove('show');}
function saveToken(){
  const t=document.getElementById('token-input').value.trim();
  if(!t) return;
  localStorage.setItem('gh_token',t);
  updateTokenBtn(); hideTokenModal();
}
function clearToken(){
  localStorage.removeItem('gh_token');
  document.getElementById('token-input').value='';
  updateTokenBtn(); hideTokenModal();
}
function updateTokenBtn(){
  const btn=document.getElementById('token-btn');
  const has=!!getToken();
  btn.textContent=has?'✓ GitHub Connected':'⚙ GitHub Token';
  btn.classList.toggle('set',has);
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
// openLb(srcsArray, startIndex)  — startIndex defaults to 0
function openLb(srcs, startIndex) {
  lbImages = (srcs||[]).filter(Boolean);
  lbIndex  = (typeof startIndex === 'number' && startIndex >= 0) ? startIndex : 0;
  if (!lbImages.length) return;
  document.getElementById('lightbox-img').src = lbImages[lbIndex];
  document.getElementById('lightbox').classList.add('show');
  document.getElementById('lightbox-nav').style.display = lbImages.length > 1 ? 'flex' : 'none';
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}
function handleLightboxClick(e){if(e.target===document.getElementById('lightbox')) closeLightbox();}
function lbNav(dir){
  lbIndex=(lbIndex+dir+lbImages.length)%lbImages.length;
  document.getElementById('lightbox-img').src=lbImages[lbIndex];
}

const esc=t=>t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#039;');


// ── SCORECARD ────────────────────────────────────────────────────────────────
function renderScorecard(ref) {
  const sc = scorecards[ref];
  if (!sc) return '';

  const pct = sc.overall_pct;
  const ringR = 20, ringC = 26;
  const circ = 2 * Math.PI * ringR;
  const offset = circ * (1 - pct / 100);
  const ringCol = pct >= 70 ? '#1E7145' : pct >= 45 ? '#7F4F00' : '#9C0006';

  // Group scores by category
  const cats = {};
  for (const s of sc.scores) {
    if (!cats[s.cat]) cats[s.cat] = [];
    cats[s.cat].push(s);
  }

  const badgeClass = score => score === 3 ? 'green' : score >= 2 ? 'amber' : score === 1 ? 'amber' : 'red';
  const badgeText  = score => score === 3 ? '✓ Good' : score === 2 ? '~ Check' : score === 1 ? '~ Partial' : '✗ Unknown';

  const scRows = Object.entries(cats).map(([cat, items]) => {
    const rows = items.map(s => `
      <div class="sc-row">
        <div class="sc-label">${s.label}</div>
        <div class="sc-note">${s.note}</div>
        <div><span class="sc-badge ${badgeClass(s.score)}">${badgeText(s.score)}</span></div>
      </div>`).join('');
    return `<div class="sc-cat-label">${cat}</div>${rows}`;
  }).join('');

  const flagsHtml = sc.red_flags.length ? `
    <div class="ds"><h3>⚠ Red flags</h3></div>
    <div class="sc-flags">
      ${sc.red_flags.map(f => `
        <div class="sc-flag"><span class="sc-flag-icon">⚠</span><span>${f}</span></div>`).join('')}
    </div>` : '';

  const qsHtml = sc.questions.length ? `
    <div class="ds"><h3>Questions to ask the agent</h3></div>
    <button class="copy-qs-btn" onclick="copyQuestions('${ref}')">📋 Copy all questions</button>
    <div class="sc-qs">
      ${sc.questions.map((q,i) => `
        <div class="sc-q"><span class="sc-q-icon">${i+1}.</span><span>${q}</span></div>`).join('')}
    </div>` : '<div style="font-size:12px;color:var(--green);margin-bottom:12px">✓ No outstanding questions</div>';

  return `
    <div class="ds"><h3>Scorecard</h3></div>
    <div class="sc-header">
      <div class="sc-overall">
        <svg class="sc-ring" viewBox="0 0 ${ringC*2} ${ringC*2}">
          <circle class="bg" cx="${ringC}" cy="${ringC}" r="${ringR}" stroke-dasharray="${circ}"/>
          <circle class="fill" cx="${ringC}" cy="${ringC}" r="${ringR}"
            stroke="${ringCol}"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset.toFixed(1)}"/>
        </svg>
        <div>
          <div class="sc-pct">${pct}% fit</div>
          <div style="font-size:11px;color:var(--muted)">${sc.scores.length} criteria assessed</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:right">
        <span style="color:var(--green);font-weight:600">${sc.scores.filter(s=>s.score===3).length} resolved ✓</span><br>
        <span style="color:var(--amber);font-weight:600">${sc.scores.filter(s=>s.score>0&&s.score<3).length} partial ~</span><br>
        <span style="color:var(--red);font-weight:600">${sc.scores.filter(s=>s.score===0).length} unknown ✗</span>
      </div>
    </div>
    <div class="sc-cats">${scRows}</div>
    ${flagsHtml}
    ${qsHtml}`;
}

function copyQuestions(ref) {
  const sc = scorecards[ref];
  if (!sc || !sc.questions.length) return;
  const text = sc.questions.map((q,i) => `${i+1}. ${q}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '✓ Copied';
    setTimeout(() => btn.textContent = '📋 Copy all questions', 2000);
  });
}

function toggleDesc(ref) {
  const s = document.getElementById('desc-short-'+ref);
  const f = document.getElementById('desc-full-'+ref);
  const b = document.getElementById('desc-toggle-'+ref);
  if (!s||!f||!b) return;
  const expanded = f.style.display !== 'none';
  s.style.display = expanded ? '' : 'none';
  f.style.display = expanded ? 'none' : '';
  b.textContent   = expanded ? '▼ Show full description' : '▲ Show less';
}
